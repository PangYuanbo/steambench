<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steambench Onboarding Control Candidates</title>
    <style>
      body {
        margin: 0;
        background: #f4f0e8;
        color: #17201b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }
      p {
        margin: 0 0 20px;
        color: #5f625f;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 18px;
      }
      figure {
        margin: 0;
        border: 1px solid #d2c8b6;
        border-radius: 8px;
        background: #fffaf2;
        overflow: hidden;
      }
      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #d2c8b6;
        padding: 10px 12px;
        font-size: 13px;
      }
      strong {
        color: #007a74;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Steambench Onboarding Control Candidates</h1>
      <p>Selected direction: C1, a compact control strip with status, next action, last run, and evidence links.</p>
      <div class="grid">
        <figure>
          <figcaption><span>A1</span><span>minimal status machine</span></figcaption>
          <img src="ig_03c041f0609c0cc7016a2ec51cc73481998860b8cde33da59f.png" alt="A1 candidate" />
        </figure>
        <figure>
          <figcaption><span>A2</span><span>minimal status machine</span></figcaption>
          <img src="ig_03c041f0609c0cc7016a2ec549f72481998119eb7ef4d72052.png" alt="A2 candidate" />
        </figure>
        <figure>
          <figcaption><span>B1</span><span>ops console</span></figcaption>
          <img src="ig_018bc2eae8483979016a2ec52ff4f4819a832cf3382a6b6951.png" alt="B1 candidate" />
        </figure>
        <figure>
          <figcaption><span>B2</span><span>ops console</span></figcaption>
          <img src="ig_018bc2eae8483979016a2ec565d018819aa045f7252bfcff95.png" alt="B2 candidate" />
        </figure>
        <figure>
          <figcaption><strong>C1 selected</strong><span>compact table strip</span></figcaption>
          <img src="ig_09e8a13084c8a6e9016a2ec528dc24819ab0e5ed0252f771f9.png" alt="C1 selected candidate" />
        </figure>
        <figure>
          <figcaption><span>C2</span><span>compact table strip</span></figcaption>
          <img src="ig_09e8a13084c8a6e9016a2ec55025a0819aaf85dff690c808a2.png" alt="C2 candidate" />
        </figure>
        <figure>
          <figcaption><span>D1</span><span>linked competitors</span></figcaption>
          <img src="ig_0878e69d414210f9016a2ec5442098819a97723b77b7d680fa.png" alt="D1 candidate" />
        </figure>
        <figure>
          <figcaption><span>D2</span><span>linked competitors</span></figcaption>
          <img src="ig_0878e69d414210f9016a2ec570796c819a9cfba4ff2a5d24b7.png" alt="D2 candidate" />
        </figure>
      </div>
    </main>
  </body>
</html>
